version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/wms_db
      SECRET_KEY: your-secret-key
      AI_API_KEY: ${AI_API_KEY}
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data: